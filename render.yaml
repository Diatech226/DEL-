services:
  - type: web
    name: del-api
    runtime: node
    rootDir: DEL-api
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGINS
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: APP_URL
        sync: false
      - key: CMS_URL
        sync: false
      - key: API_URL
        sync: false
